<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Anatomy Explorer</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Verhindert das Verspringen des Layouts */
    #info-box {
      min-height: 300px; /* Reserviert festen Platz für die längste Beschreibung */
      min-width: 300px; /* Reserviert festen Platz für die längste Beschreibung */
      background: #f4f4f4;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-top: 20px;
      display: flex;
      flex-direction: column;
    }
    #area-info {
      margin-top: 10px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="active">Explorer</a>
    <a href="quiz.html">Quiz</a>
  </nav>

  <h1>Brodmann Areale Explorer</h1>

  <div id="brain-container">
    <!-- Brain SVG -->
    <object id="brain-svg" type="image/svg+xml" data="assets/Gray726-Brodman.svg"></object>
    
    <!-- Info box -->
    <div id="info-box">
      <h2>Hover over a region</h2>
      <p id="area-info"></p>
    </div>
  </div>

  <div id="legend">
    <div class="legend-item"><span class="swatch frontal"></span> Frontallappen</div>
    <div class="legend-item"><span class="swatch parietal"></span> Parietallappen</div>
    <div class="legend-item"><span class="swatch temporal"></span> Temporallappen</div>
    <div class="legend-item"><span class="swatch occipital"></span> Occipitallappen</div>
    <div class="legend-item"><span class="swatch limbic"></span> Limbisches System</div>
    <div class="legend-item"><span class="swatch unknown"></span> Unbekannt</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
